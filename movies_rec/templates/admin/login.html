<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — 2MWatch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: #0a0a0f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(124,106,247,0.07) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(232,201,109,0.05) 0%, transparent 50%);
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: #111118;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      position: relative;
    }

    /* top content area */
    .card-top {
      padding: 2.5rem 2rem 1.5rem;
      text-align: center;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .logo-icon {
      font-size: 2rem;
      font-family: 'Georgia', serif;
      font-weight: 900;
      color: #e8c96d;
      letter-spacing: -0.04em;
    }
    .logo-icon span { color: #7c6af7; }

    .card-top h1 {
      font-size: 1rem;
      font-weight: 800;
      color: #e8e8f0;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 0.3rem;
    }
    .card-top p {
      font-size: 0.8rem;
      color: #6b6b80;
      margin: 0;
    }

    /* fields */
    .fields-area {
      padding: 1.5rem 2rem 1rem;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 0.5rem 0;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .input-row:focus-within {
      border-bottom-color: #e8c96d;
    }
    .input-icon { font-size: 1rem; color: #6b6b80; flex-shrink: 0; }
    .input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8f0;
      font-size: 0.9rem;
      padding: 0.25rem 0;
    }
    .input-row input::placeholder { color: #3a3a50; }

    .error-msg {
      background: rgba(224,92,92,0.1);
      border: 1px solid rgba(224,92,92,0.25);
      border-radius: 8px;
      color: #e05c5c;
      padding: 0.6rem 0.9rem;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    /* wave bottom */
    .card-bottom {
      position: relative;
      height: 130px;
      margin-top: 0.5rem;
    }
    .wave-svg {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
    }

    .btn-login {
      position: absolute;
      bottom: 68px;
      left: 2rem;
      z-index: 10;
      background: #e8c96d;
      color: #0a0a0f;
      border: none;
      border-radius: 100px;
      padding: 0.6rem 2rem;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 20px rgba(232,201,109,0.35);
    }
    .btn-login:hover { background: #f0d47f; transform: translateY(-1px); }

    .back-link {
      position: absolute;
      bottom: 12px;
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      z-index: 10;
    }
    .back-link a { color: rgba(232,201,109,0.6); text-decoration: none; }
    .back-link a:hover { color: #e8c96d; }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="card-top">
      <div class="brand-logo">
        <span class="logo-icon">2M<span>W</span></span>
      </div>
      <h1>Admin Panel</h1>
      <p>Control panel login</p>
    </div>

    <div class="fields-area">
      {% if form.errors %}
      <div class="error-msg">Invalid username or password.</div>
      {% endif %}

      <form method="post" action="{{ request.path }}" id="login-form">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="input-row">
          <span class="input-icon">👤</span>
          <input type="text" name="username" placeholder="Username"
                 autofocus autocomplete="username" required>
        </div>

        <div class="input-row">
          <span class="input-icon">🔑</span>
          <input type="password" name="password" placeholder="Password"
                 autocomplete="current-password" required>
        </div>
      </form>
    </div>

    <!-- wave + button -->
    <div class="card-bottom">
      <button class="btn-login" onclick="document.getElementById('login-form').submit()">Login</button>

      <svg class="wave-svg" viewBox="0 0 380 130" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <!-- back wave -->
        <path d="M0,80 C60,40 120,100 190,70 C260,40 320,90 380,60 L380,130 L0,130 Z"
              fill="rgba(124,106,247,0.18)"/>
        <!-- mid wave -->
        <path d="M0,95 C50,65 110,110 180,85 C250,60 310,100 380,75 L380,130 L0,130 Z"
              fill="rgba(124,106,247,0.28)"/>
        <!-- front wave -->
        <path d="M0,108 C70,85 130,118 200,100 C270,82 330,112 380,95 L380,130 L0,130 Z"
              fill="rgba(124,106,247,0.45)"/>
      </svg>

      <div class="back-link"><a href="/">← Back to main page</a></div>
    </div>
  </div>

</body>
</html>
